name: Deploy to Hostinger (FTP)

# Auto-deploys the whole site to Hostinger public_html whenever code is
# pushed to main. You can also run it manually from the Actions tab.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Never run two deploys at once
concurrency:
  group: ftp-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync files to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          # ── These three values come from GitHub repo Secrets ──
          server:   ${{ secrets.FTP_SERVER }}     # e.g. ftp.apnesoftware.com  OR the IP in hPanel
          username: ${{ secrets.FTP_USERNAME }}   # the FTP account username from hPanel
          password: ${{ secrets.FTP_PASSWORD }}   # the FTP account password from hPanel

          # Connection. If FTPS fails on your plan, change ftps -> ftp
          protocol: ftps
          port: 21

          # Where to upload ON the server. For most Hostinger accounts the
          # site lives in public_html/. If your FTP account already opens
          # directly inside public_html, change this to ./
          server-dir: public_html/

          # What to upload (the repo root = your site root)
          local-dir: ./

          # Don't upload repo plumbing / docs / setup notes
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/*.md
            **/SETUP-INSTRUCTIONS.md
            .gitignore
